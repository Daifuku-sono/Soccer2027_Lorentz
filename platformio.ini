[env:xiao_ble]
platform = nordicnrf52
board = xiao_ble
framework = arduino

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit ST7735 and ST7789 Library